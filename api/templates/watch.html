<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <title>Watch Episode</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Poppins', sans-serif;
            position: relative; /* Position relative for absolute elements */
        }

        h1 {
            color: #bb86fc;
            margin: 20px 0;
            font-size: 2.2em;
        }

        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 90%;
            height: 70%;
            margin: 0;
            overflow: hidden;
            border-radius: 10px;
            background-color: #1e1e1e;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .episode-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            width: 90%;
        }

        .episode-navigation button {
            background-color: #bb86fc;
            border: none;
            color: #121212;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            flex: 1; /* Allows buttons to expand and fill space */
            margin: 0 5px; /* Space between buttons */
        }

        .episode-navigation button:hover {
            background-color: #9b70db;
        }

        p {
            color: #e0e0e0;
            font-size: 1.2em;
        }

        a {
            margin-top: 20px;
            font-size: 1.1em;
            color: #bb86fc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #9b70db;
        }

        /* Back to Episodes button style */
        .back-button {
            position: absolute; /* Position it absolutely within the body */
            top: 20px; /* Adjust vertical position */
            left: 20px; /* Adjust horizontal position */
            background-color: #bb86fc;
            color: #121212;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: #9b70db;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.history.back()">Back to Episodes</button>
    <h1>Watch Episode {{ Episode }}</h1>
    <div class="video-container">
        {% if episode_link %}
            <video controls>
                <source src="{{ episode_link }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        {% else %}
            <p>Sorry, no video available to watch.</p>
        {% endif %}
    </div>

    <div class="episode-navigation">
        {% if prev_episode_url %}
            <form action="{{ url_for('watch') }}" method="post">
                <input type="hidden" name="episode_url" value="{{ prev_episode_url }}">
                <button type="submit">
                    Previous Episode {% if prev_episode_number %}({{ prev_episode_number }}){% endif %}
                </button>
            </form>
        {% else %}
            <div style="flex: 1;"></div> <!-- Empty div to fill space if no previous episode -->
        {% endif %}

        {% if next_episode_url %}
            <form action="{{ url_for('watch') }}" method="post">
                <input type="hidden" name="episode_url" value="{{ next_episode_url }}">
                <button type="submit">
                    Next Episode {% if next_episode_number %}({{ next_episode_number }}){% endif %}
                </button>
            </form>
        {% endif %}
    </div>

    <a href="/">Back to Search</a>

    <script>
        const video = document.getElementById('video');

        // Enable fullscreen on video click
        video.addEventListener('click', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.mozRequestFullScreen) { // Firefox
                video.mozRequestFullScreen();
            } else if (video.webkitRequestFullscreen) { // Chrome, Safari, and Opera
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { // IE/Edge
                video.msRequestFullscreen();
            }
        });
    </script>
    
</body>
</html>
