<!DOCTYPE html>
<html lang="en">
<head>
    <title>Watch Episode</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Poppins', sans-serif;
            position: relative;
        }

        h1 {
            color: #bb86fc;
            margin: 80px 0 20px;
            font-size: 2.2em;
        }

        .plyr--video {
            width: 90%;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            background-color: #1e1e1e;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .episode-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            width: 90%;
        }

        .episode-navigation button {
            background-color: #bb86fc;
            border: none;
            color: #121212;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            flex: 1;
            margin: 0 5px;
        }

        .episode-navigation button:hover {
            background-color: #9b70db;
        }

        p {
            color: #e0e0e0;
            font-size: 1.2em;
        }

        a {
            margin-top: 20px;
            font-size: 1.1em;
            color: #bb86fc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #9b70db;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #bb86fc;
            color: #121212;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            z-index: 100;
        }

        .back-button:hover {
            background-color: #9b70db;
        }

        /* Add media query for smaller screens */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
                margin-top: 100px;
            }

            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
            }

            .episode-navigation {
                flex-direction: column;
                align-items: center;
            }

            .episode-navigation button {
                margin: 10px 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='/episodes/{{ back_to_ep }}'">Back to Episodes</button>
    <h1>Watch Episode {{ Episode }}{% if episode_number %} (Episode {{ episode_number }}){% endif %}</h1>

    {% if episode_link %}
        <!-- Plyr Video Element -->
        <video id="plyr-video" controls>
            <source src="{{ episode_link }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    {% else %}
        <p>Sorry, no video available to watch.</p>
    {% endif %}

    <div class="episode-navigation">
        {% if prev_episode_url %}
            <form action="{{ url_for('watch', eps_title=prev_episode_url.split('/')[-1]) }}" method="post">
                <input type="hidden" name="episode_url" value="{{ prev_episode_url }}">
                <button type="submit">
                    Previous Episode {% if prev_episode_number %}({{ prev_episode_number }}){% endif %}
                </button>
            </form>
        {% else %}
            <div style="flex: 1;"></div>
        {% endif %}

        {% if next_episode_url %}
            <form action="{{ url_for('watch', eps_title=next_episode_url.split('/')[-1]) }}" method="post">
                <input type="hidden" name="episode_url" value="{{ next_episode_url }}">
                <button type="submit">
                    Next Episode {% if next_episode_number %}({{ next_episode_number }}){% endif %}
                </button>
            </form>
        {% endif %}
    </div>

    <a href="/home">Back to Search</a>

    <!-- Plyr JavaScript -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        // Initialize Plyr
        const player = new Plyr('#plyr-video', {
            controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
        });

        // Fullscreen toggle on video click
        document.getElementById('plyr-video').addEventListener('click', () => {
            player.fullscreen.toggle();
        });

        // Key event listeners for play/pause and fullscreen
        document.addEventListener('keydown', (event) => {
            if (event.key === 'f') {
                player.fullscreen.toggle();
            }
            if (event.key === ' ') {
                event.preventDefault();
                player.togglePlay();
            }
        });
    </script>
</body>
</html>
