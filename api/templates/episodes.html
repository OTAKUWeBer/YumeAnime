<!DOCTYPE html>
<html lang="en">
<head>
    <title>Episode List</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            text-align: center;
            color: #bb86fc;
            margin-top: 40px;
            font-size: 3em;
            font-weight: 700;
        }

        p {
            text-align: center;
            margin: 40px 0;
            font-size: 1.2em;
        }

        a {
            color: #bb86fc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #9b70db;
        }

        .header {
            display: flex;
            justify-content: center; /* Center all items */
            align-items: center; /* Align items vertically */
            max-width: 100%;
            margin: 6px auto;
            padding: 0 20px;
            width: 100%;
        }

        .total-episodes {
            font-size: 1.2em;
            color: #bb86fc;
            padding-right: 20px; /* Space between total episodes and search bar */
        }

        .search-container {
            text-align: center; /* Center align text */
            width: 100%;
            max-width: 300px; /* Limit the maximum width */
        }

        .search-container input {
            padding: 8px; /* Smaller padding */
            width: 80%; /* Take full width of container */
            border: none;
            border-radius: 5px;
            font-size: 1em; /* Smaller font size */
            background-color: #1e1e1e;
            color: #e0e0e0;
        }

        .search-container input::placeholder {
            color: #b0b0b0; /* Placeholder color */
        }

        .episode-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px auto;
            max-width: 100%;
            padding: 0 20px; /* Added padding for spacing */
        }

        .episode-card {
            background-color: #1e1e1e;
            padding: 10px 5px; /* Smaller padding */
            margin: 5px; /* Smaller margin */
            border-radius: 6px; /* Slightly rounded corners */
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3); /* Subtle shadow */
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            font-size: 1.2em; /* Smaller font size for episode numbers */
            color: #bb86fc; /* Text color */
            min-width: 40px; /* Minimum width for uniformity */
            max-width: 60px; /* Maximum width to maintain compactness */
        }

        .episode-card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4); /* Darker shadow on hover */
        }

        .watched {
            background-color: #424242; /* Darker background for watched episodes */
            color: #757575; /* Darker text color for watched episodes */
        }

        .back-button {
            display: inline-block;
            margin: 30px 0;
            padding: 10px 20px;
            font-size: 1.2em;
            text-decoration: none;
            color: #bb86fc;
            background-color: transparent;
            border: 2px solid #bb86fc;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .back-button:hover {
            background-color: #bb86fc; /* Change background on hover */
            color: #121212; /* Change text color on hover */
        }
    </style>
</head>
<body>
    <h1>Episodes of {{ title }}</h1>

<div class="header">
    <div class="total-episodes">Total Episodes: {{ total_episodes }}</div>
    <div class="search-container">
        <input type="text" id="episodeSearch" placeholder="Search by episode number..." onkeyup="filterEpisodes()">
    </div>
</div>

<div class="episode-list" id="episodeList">
    {% for episode, epn in episodes %}
    <!-- Extract the episode title from the URL -->
    {% set episode_title = episode.split('/')[-1] %}
    <div class="episode-card" onclick="window.location.href='{{ url_for('watch', eps_title=episode_title) }}'">
        {{ epn }}
    </div>
    {% endfor %}
</div>

    <p><a href="{{ url_for('index') }}">Back to Search</a></p>

    <script>
        // JavaScript function to filter episodes by episode number
        function filterEpisodes() {
            var input, filter, episodeList, episodeCards, epn, i;
            input = document.getElementById('episodeSearch');
            filter = input.value.toUpperCase();
            episodeList = document.getElementById("episodeList");
            episodeCards = episodeList.getElementsByClassName('episode-card');

            // Loop through all episode cards, and hide those that don't match the search query
            for (i = 0; i < episodeCards.length; i++) {
                epn = episodeCards[i].innerText || episodeCards[i].textContent;
                if (epn.toUpperCase().indexOf(filter) > -1) {
                    episodeCards[i].style.display = "";
                } else {
                    episodeCards[i].style.display = "none";
                }
            }
        }

        function watchEpisode(card, episodeUrl) {
            // Toggle the 'watched' class to mark the episode as watched
            card.classList.toggle('watched');

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/watch';
            const input1 = document.createElement('input');
            input1.type = 'hidden';
            input1.name = 'episode_url';
            input1.value = episodeUrl;
            const input2 = document.createElement('input');
            input2.type = 'hidden';
            input2.name = 'total_episodes';
            input2.value = '{{ total_episodes }}';
            form.appendChild(input1);
            form.appendChild(input2);
            document.body.appendChild(form);
            form.submit();
        }

    </script>
</body>
</html>
