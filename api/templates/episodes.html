<!DOCTYPE html>
<html lang="en">
<head>
    <title>Episode List</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container for title and logo */
        .title-logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* Allow the logo to be positioned in absolute terms */
            margin-top: 40px;
            width: 100%; /* Take up full width */
        }

        h1 {
            text-align: center;
            color: #bb86fc;
            margin: 0;
            font-size: 3em;
            font-weight: 700;
            max-width: 90%; /* Limit the width of the title to prevent it from stretching too wide */
            word-wrap: break-word; /* Ensure long titles break to a new line */
        }

        /* Adjust title for smaller screens */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em; /* Reduce title size on smaller screens */
            }
        }

        p {
            text-align: center;
            margin: 40px 0;
            font-size: 1.2em;
        }

        a {
            color: #bb86fc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #9b70db;
        }

        /* Added styles for the logo */
        .logo-container {
            position: absolute;
            top: 4px;
            left: 15px;
        }

        .logo-container img {
            width: 100px;
            height: auto;
            cursor: pointer;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            margin: 6px auto;
            padding: 0 20px;
            width: 100%;
        }

        .total-episodes {
            font-size: 1.2em;
            color: #bb86fc;
            padding-right: 20px;
        }

        .search-container {
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .search-container input {
            padding: 8px;
            width: 80%;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            background-color: #1e1e1e;
            color: #e0e0e0;
        }

        .search-container input::placeholder {
            color: #b0b0b0;
        }

        .episode-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px auto;
            max-width: 100%;
            padding: 0 20px;
        }

        .episode-card {
            background-color: #1e1e1e;
            padding: 10px 5px;
            margin: 5px;
            border-radius: 6px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            font-size: 1.2em;
            color: #bb86fc;
            min-width: 40px;
            max-width: 60px;
        }

        .episode-card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .watched {
            background-color: #424242;
            color: #757575;
        }

        .back-button {
            display: inline-block;
            margin: 30px 0;
            padding: 10px 20px;
            font-size: 1.2em;
            text-decoration: none;
            color: #bb86fc;
            background-color: transparent;
            border: 2px solid #bb86fc;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .back-button:hover {
            background-color: #bb86fc;
            color: #121212;
        }

        @media (max-width: 768px) {
            .logo-container {
                top: -10px;
                left: 3px;
        }
    }

    </style>
</head>
<body>

    <div class="title-logo-container">
        <!-- Logo container stays at top left -->
        <div class="logo-container">
            <img src="{{ url_for('static', filename='images/rm_logo.png') }}" alt="Logo">
        </div>

        <!-- Main title of the page -->
        <h1>Episodes of {{ title }}</h1>
    </div>

    <div class="header">
        <div class="total-episodes">Total Episodes: {{ total_episodes }} | Status: {{ status }}</div>
        <div class="search-container">
            <input type="text" id="episodeSearch" placeholder="Search by episode number..." onkeyup="filterEpisodes()">
        </div>
    </div>

    <div class="episode-list" id="episodeList">
        {% for episode, epn in episodes %}
        {% set episode_title = episode.split('/')[-1] %}
        <div class="episode-card" onclick="window.location.href='{{ url_for('watch', eps_title=episode_title) }}'">
            {{ epn }}
        </div>
        {% endfor %}
    </div>

    <p><a href="{{ url_for('index') }}">Back to Search</a></p>

    <script>
        // JavaScript function to filter episodes by episode number
        function filterEpisodes() {
            var input, filter, episodeList, episodeCards, epn, i;
            input = document.getElementById('episodeSearch');
            filter = input.value.toUpperCase();
            episodeList = document.getElementById("episodeList");
            episodeCards = episodeList.getElementsByClassName('episode-card');

            for (i = 0; i < episodeCards.length; i++) {
                epn = episodeCards[i].innerText || episodeCards[i].textContent;
                if (epn.toUpperCase().indexOf(filter) > -1) {
                    episodeCards[i].style.display = "";
                } else {
                    episodeCards[i].style.display = "none";
                }
            }
        }

        function watchEpisode(card, episodeUrl) {
            card.classList.toggle('watched');

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/watch';
            const input1 = document.createElement('input');
            input1.type = 'hidden';
            input1.name = 'episode_url';
            input1.value = episodeUrl;
            const input2 = document.createElement('input');
            input2.type = 'hidden';
            input2.name = 'total_episodes';
            input2.value = '{{ total_episodes }}';
            form.appendChild(input1);
            form.appendChild(input2);
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
