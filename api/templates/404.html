{% extends "base.html" %}

{% block head %}
    <title>Page Not Found - YumeAnime</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <meta property="og:title" content="YumeAnime - Page Not Found" />
    <meta property="og:description" content="The page you are looking for does not exist." />
    <meta property="og:image" content="{{ url_for('static', filename='images/logo.png') }}" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .error-container {
            text-align: center;
            margin-top: 50px;
        }

        .error-container h1 {
            font-size: 3rem;
            margin: 0;
        }

        .error-container p {
            font-size: 1.5rem;
            margin: 20px 0;
        }

        .back-home-button {
            background-color: #bb86fc;
            color: #121212;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .back-home-button:hover {
            background-color: #9b70db;
        }
    </style>
{% endblock %}

{% block body %}
    <div class="error-container">
        <h1>404 - Page Not Found</h1>
        {% if error_message %}
            <p>{{ error_message }}</p>
        {% else %}
            <p>The page you are looking for does not exist.</p>
        {% endif %}
        <button class="back-home-button" onclick="window.location.href='/home'">Go back to Home</button>
    </div>
{% endblock %}
